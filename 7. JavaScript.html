<script>
  let developerKey = ''; 
  let projectNumber = ''; 
  let oauthToken = '';    
  let pickerApiLoaded = false;
  let myDriveAllowed = true;

  window.onload = function() {
    // 1. Fetch Config First
    google.script.run.withSuccessHandler(val => {
       myDriveAllowed = val;
       google.script.run
        .withSuccessHandler(populateDrives)
        .withFailureHandler(e => alert("Error: " + e.message))
        .getAuthorizedSharedDrives();
    }).getMyDriveAllowed();

    // 2. Fetch Copy Permissions (New)
    google.script.run.withSuccessHandler(applyCopyPermissions).getUserCopyPermission();

    // 3. Init Keys
    google.script.run.withSuccessHandler(k => developerKey = k).getApiKey();
    google.script.run.withSuccessHandler(n => projectNumber = String(n)).getProjectNumber();
    google.script.run.withSuccessHandler(t => oauthToken = t).getOAuthToken();
  };

  // --- PERMISSION UI LOGIC ---
  function applyCopyPermissions(canCopy) {
    const checkbox = document.getElementById('copyCheckbox');
    const warning = document.getElementById('copyWarning');
    const helpText = document.getElementById('copyHelpText');
    
    if (!canCopy) {
      checkbox.checked = false;
      checkbox.disabled = true;
      warning.style.display = 'block';
      helpText.style.opacity = '0.5';
    } else {
      checkbox.disabled = false;
      warning.style.display = 'none';
      helpText.style.opacity = '1';
    }
  }

  // --- POPULATE BOTH DROPDOWNS ---
  function populateDrives(drives) {
    const sourceSelect = document.getElementById('sourceDriveSelect');
    const targetSelect = document.getElementById('targetDrive');

    sourceSelect.innerHTML = '<option value="" selected>-- Selecteer Bron Drive --</option>';
    targetSelect.innerHTML = '<option value="" selected>-- Selecteer Doel Drive --</option>';

    if (myDriveAllowed) {
      let opt = document.createElement('option');
      opt.value = "root";
      opt.text = "📂 My Drive (Mijn Persoonlijke Drive)";
      sourceSelect.appendChild(opt);
      let sep = document.createElement('option');
      sep.disabled = true;
      sep.text = "──────────────";
      sourceSelect.appendChild(sep);
    }

    drives.forEach(d => {
      let sOpt = document.createElement('option');
      sOpt.value = d.id;
      sOpt.text = "👥 " + d.name;
      sourceSelect.appendChild(sOpt);

      let tOpt = document.createElement('option');
      tOpt.value = d.id;
      tOpt.text = "👥 " + d.name;
      targetSelect.appendChild(tOpt);
    });
    
    sourceSelect.disabled = false;
    targetSelect.disabled = false;
  }

  // --- UI LOGIC ---
  function resetSourceSelection() {
    document.getElementById('sourceFolderId').value = "";
    document.getElementById('sourceFolderName').value = "";
    
    const driveId = document.getElementById('sourceDriveSelect').value;
    const btn = document.getElementById('btnPickSource');
    
    if (driveId) {
      btn.disabled = false;
      btn.className = "btn btn-primary";
    } else {
      btn.disabled = true;
      btn.className = "btn btn-secondary";
    }
    validateForm();
  }

  function validateDestination() {
    const driveId = document.getElementById('targetDrive').value;
    if (!driveId) {
      document.getElementById('destHelp').innerHTML = "Selecteer een drive.";
      validateForm();
      return;
    }

    document.getElementById('submitBtn').disabled = true;
    document.getElementById('destHelp').innerHTML = "<span style='color:orange'>Rechten controleren...</span>";

    google.script.run
      .withSuccessHandler(function(result) {
        if (result.valid) {
          document.getElementById('destHelp').innerHTML = "<span style='color:green'>✔ Rechten OK (" + result.name + ")</span>";
          validateForm();
        } else {
          document.getElementById('destHelp').innerHTML = "<span style='color:red'>⛔ " + result.error + "</span>";
          document.getElementById('targetDrive').value = ""; 
        }
      })
      .validateDestinationPermissions(driveId);
  }

  // --- PICKER LOGIC ---
  function onApiLoad() {
    gapi.load('picker', { 'callback': function() { pickerApiLoaded = true; } });
  }

  function loadPicker() {
    if (!pickerApiLoaded || !oauthToken || !developerKey || !projectNumber) {
      if (!oauthToken) {
         google.script.run.withSuccessHandler(t => { oauthToken = t; loadPicker(); }).getOAuthToken();
         return;
      }
      alert("System Initializing... Wait 1 second and try again.");
      return;
    }
    
    const parentId = document.getElementById('sourceDriveSelect').value;
    if (!parentId) {
      alert("Selecteer eerst een Drive uit de lijst.");
      return;
    }
    
    createPicker(parentId);
  }

  function createPicker(parentId) {
    const origin = 'https://script.google.com';
    
    const view = new google.picker.DocsView()
      .setIncludeFolders(true)
      .setSelectFolderEnabled(true)
      .setMimeTypes('application/vnd.google-apps.folder')
      .setParent(parentId) 
      .setMode('list');    

    if (parentId !== 'root') {
      view.setEnableTeamDrives(true);
    }

    const picker = new google.picker.PickerBuilder()
      .setTitle("Selecteer Map")
      .addView(view)
      .setOAuthToken(oauthToken)
      .setDeveloperKey(developerKey)
      .setAppId(projectNumber)
      .setOrigin(origin)
      .setCallback(pickerCallback)
      .setSize(750, 500)
      .enableFeature(google.picker.Feature.SUPPORT_DRIVES)
      .enableFeature(google.picker.Feature.SUPPORT_TEAM_DRIVES)
      .build();
      
    picker.setVisible(true);
  }

  function pickerCallback(data) {
    if (data[google.picker.Response.ACTION] == google.picker.Action.PICKED) {
      const doc = data[google.picker.Response.DOCUMENTS][0];
      document.getElementById('sourceFolderId').value = doc[google.picker.Document.ID];
      document.getElementById('sourceFolderName').value = doc[google.picker.Document.NAME];
      validateForm();
    }
  }

  function validateForm() {
    const s = document.getElementById('sourceFolderId').value;
    const t = document.getElementById('targetDrive').value;
    const destHelp = document.getElementById('destHelp').innerHTML;
    
    const isDestValid = t && destHelp.includes("✔");
    const btn = document.getElementById('submitBtn');
    
    if (s && isDestValid) {
      btn.disabled = false;
      btn.className = "btn btn-success btn-lg";
      btn.innerText = "Start";
    } else {
      btn.disabled = true;
      btn.className = "btn btn-secondary btn-lg";
      btn.innerText = "Selecteer Bron & Doel";
    }
  }

  function submitForm() {
    document.getElementById('loadingSpinner').style.display = 'block';
    document.getElementById('transferForm').style.display = 'none';
    
    const sId = document.getElementById('sourceFolderId').value;
    const sName = document.getElementById('sourceFolderName').value;
    const tId = document.getElementById('targetDrive').value;
    const tName = document.getElementById('targetDrive').options[document.getElementById('targetDrive').selectedIndex].text;
    const isCopy = document.getElementById('copyCheckbox').checked;
    
    google.script.run
      .withSuccessHandler(r => {
         document.getElementById('loadingSpinner').style.display = 'none';
         document.getElementById('resultArea').innerHTML = `
           <div class="alert alert-success">
             <h4>Verzoek Ontvangen!</h4>
             <p>${r.message}</p>
             <hr>
             <strong>Referentie: ${r.requestId}</strong>
             <br><br>
             <small style="color:#666;">Het scherm vernieuwt automatisch over 30 seconden...</small>
           </div>`;
           
         setTimeout(function() {
            location.reload();
         }, 30000);
      })
      .withFailureHandler(e => {
         document.getElementById('loadingSpinner').style.display = 'none';
         document.getElementById('transferForm').style.display = 'block';
         alert("Fout: " + e.message);
      })
      .submitMoveRequest(sId, tId, sName, tName, isCopy);
  }
</script>
